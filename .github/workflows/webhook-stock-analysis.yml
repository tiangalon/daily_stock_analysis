name: Webhook 个股分析

on:
  repository_dispatch:
    types:
      - stock-analysis

  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代码列表，逗号分隔（如 600519,000001,hk00700,AAPL）'
        required: true
        type: string
      report_type:
        description: '报告类型'
        required: false
        default: 'simple'
        type: choice
        options:
          - simple
          - full
      enable_notify:
        description: '是否发送通知'
        required: false
        default: true
        type: boolean

concurrency:
  group: webhook-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}

    steps:
      - name: 解析 webhook 载荷
        id: parse
        run: |
          # 从 repository_dispatch 或 workflow_dispatch 获取股票列表
          if [ -n "${{ github.event.client_payload.stocks }}" ]; then
            # repository_dispatch（webhook 触发）
            STOCKS="${{ github.event.client_payload.stocks }}"
          else
            # workflow_dispatch（手动触发）
            STOCKS="${{ github.event.inputs.stocks }}"
          fi

          # 获取可选参数
          REPORT_TYPE="${{ github.event.client_payload.report_type || github.event.inputs.report_type || 'simple' }}"
          ENABLE_NOTIFY="${{ github.event.client_payload.enable_notify || github.event.inputs.enable_notify || 'true' }}"

          echo "stocks=${STOCKS}" >> $GITHUB_OUTPUT
          echo "report_type=${REPORT_TYPE}" >> $GITHUB_OUTPUT
          echo "enable_notify=${ENABLE_NOTIFY}" >> $GITHUB_OUTPUT

          echo "📊 Webhook 个股分析任务"
          echo "股票列表: ${STOCKS}"
          echo "报告类型: ${REPORT_TYPE}"
          echo "发送通知: ${ENABLE_NOTIFY}"

      - name: 随机延迟
        run: sleep $((RANDOM % 30))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: |
          mkdir -p data logs reports

      - name: 执行个股分析
        env:
          # ==========================================
          # AI 配置
          # ==========================================
          GENERATION_BACKEND: ${{ vars.GENERATION_BACKEND || secrets.GENERATION_BACKEND }}
          GENERATION_FALLBACK_BACKEND: ${{ vars.GENERATION_FALLBACK_BACKEND || secrets.GENERATION_FALLBACK_BACKEND || 'litellm' }}
          GENERATION_BACKEND_TIMEOUT_SECONDS: ${{ vars.GENERATION_BACKEND_TIMEOUT_SECONDS || secrets.GENERATION_BACKEND_TIMEOUT_SECONDS }}
          GENERATION_BACKEND_MAX_OUTPUT_BYTES: ${{ vars.GENERATION_BACKEND_MAX_OUTPUT_BYTES || secrets.GENERATION_BACKEND_MAX_OUTPUT_BYTES }}
          GENERATION_BACKEND_MAX_CONCURRENCY: ${{ vars.GENERATION_BACKEND_MAX_CONCURRENCY || secrets.GENERATION_BACKEND_MAX_CONCURRENCY }}
          LOCAL_CLI_BACKEND_MAX_CONCURRENCY: ${{ vars.LOCAL_CLI_BACKEND_MAX_CONCURRENCY || secrets.LOCAL_CLI_BACKEND_MAX_CONCURRENCY }}
          AGENT_GENERATION_BACKEND: ${{ vars.AGENT_GENERATION_BACKEND || secrets.AGENT_GENERATION_BACKEND }}
          # LITELLM_CONFIG
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
